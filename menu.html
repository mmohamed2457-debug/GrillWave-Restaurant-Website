<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GrillWave | Menu</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="main-navbar">
  <div class="nav-container">
    <a class="brand" href="index.html"><span>🍽</span> GrillWave</a>
    <button class="menu-toggle" id="menuToggle">☰</button>

    <ul class="nav-links" id="navLinks">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="menu.html" class="active">Menu</a></li>
      <li><a href="cart.html">Cart & Orders</a></li>
      <li><a href="reservation.html">Reservation</a></li>
      <li><a href="profile.html">Profile</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="admin.html" id="adminLink">Admin</a></li>
      <li><a href="#" id="logoutBtn">Logout</a></li>
    </ul>
  </div>
</nav>

<header class="page-header">
  <div>
    <span>Our Menu</span>
    <h1>Fresh Meals, Drinks, and Desserts</h1>
    <p>Search, filter, and add your favorite items to the cart.</p>
  </div>
</header>

<main>
  <section class="section">
    <div class="container app-panel">

      <div id="feedback" class="feedback"></div>

      <div class="menu-tools">
        <input id="searchInput" type="search" placeholder="Search burger, pizza, juice...">

        <div class="filter-box">
          <button class="filter-btn active" data-category="all">All</button>
          <button class="filter-btn" data-category="foods">Foods</button>
          <button class="filter-btn" data-category="drinks">Drinks</button>
          <button class="filter-btn" data-category="desserts">Desserts</button>
        </div>
      </div>

      <div class="summary-bar">
        <span id="menuCount">0 items</span>
        <span id="cartCount">Cart: 0</span>
        <span id="cartTotal">Total: 0 EGP</span>
      </div>

      <div id="menuList" class="menu-grid"></div>

      <div class="center-actions">
        <a href="cart.html" class="main-btn">Go To Cart</a>
      </div>

    </div>
  </section>
</main>

<button id="topBtn" class="top-btn">↑</button>

<script src="js/auth.js"></script>
<script src="js/script.js"></script>
</body>
</html>
